kind: AIchorManifest
apiVersion: 0.2.2

builder:
  image: image
  context: pytorch-demo
  dockerfile: ./Dockerfile

spec:
  operator: pytorch
  image: image
  command: "python3 src/main.py"

  tensorboard:
    enabled: true

  types:
    Master:
      count: 1
      resources:
        rdma: # new
          # list of network devices to mount on the container
          devices: ["sriov_a", "sriov_b","sriov_c", "sriov_d"]
        cpus: 8
        ramRatio: 4
        accelerators: # optional
          gpu:
            count: 1
            type: gpu
            product: NVIDIA-H100-80GB-HBM3
    Worker:
      count: 1
      resources:
        rdma: # new
          # list of network devices to mount on the container
          devices: ["sriov_a", "sriov_b","sriov_c", "sriov_d"]
        cpus: 8
        ramRatio: 4
        accelerators: # optional
          gpu:
            count: 1
            type: gpu
            product: NVIDIA-H100-80GB-HBM3
 
